{% extends "base.html" %}
{% block content %}
    <div class="card">
        <h2>Generate a Sales Forecast</h2>
        <form action="/predict" method="POST">
            <label for="n_days">Number of days to forecast (1-90):</label>
            <input type="number" id="n_days" name="n_days" min="1" max="90" value="30" required>
            <button type="submit">Forecast</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
{% endblock %}
